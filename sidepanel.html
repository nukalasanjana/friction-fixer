<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friction Fixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #16213e;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2d50;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a78bfa;
      flex: 1;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .status-dot.offline { background: #f87171; }

    /* ── Context badge ── */
    #context-bar {
      background: #0f3460;
      padding: 6px 14px;
      font-size: 11px;
      color: #93c5fd;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #context-bar.empty { color: #6b7280; }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .msg {
      max-width: 92%;
      padding: 8px 11px;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 12.5px;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #4c1d95;
      color: #ede9fe;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e293b;
      color: #cbd5e1;
    }
    .msg.system {
      align-self: center;
      background: #1c2b1c;
      color: #86efac;
      font-size: 11px;
      border-radius: 6px;
      max-width: 96%;
      text-align: center;
    }
    .msg.socratic {
      align-self: flex-start;
      background: #1e3a5f;
      color: #bae6fd;
      border-left: 3px solid #38bdf8;
      border-radius: 4px 10px 10px 4px;
      font-style: italic;
    }

    /* ── Preview Card ── */
    #preview-card {
      margin: 6px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-shrink: 0;
    }
    #preview-card.visible { display: block; }

    .card-header {
      background: #1e293b;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #334155;
    }
    .card-header-title {
      font-size: 11px;
      color: #94a3b8;
      flex: 1;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Strategy badge pill */
    .strategy-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .strategy-badge.Conservation  { background: #1d4ed8; color: #bfdbfe; }
    .strategy-badge.Rearrangement { background: #b45309; color: #fde68a; }
    .strategy-badge.Simplification{ background: #065f46; color: #a7f3d0; }
    .strategy-badge.Reduction     { background: #9f1239; color: #fecdd3; }
    .strategy-badge.Increase      { background: #5b21b6; color: #ddd6fe; }

    .card-body {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
      margin-bottom: 3px;
    }
    .card-section-text {
      font-size: 12px;
      line-height: 1.55;
      color: #cbd5e1;
    }
    #card-diagnosis { color: #fbbf24; } /* amber — signals a problem */
    #card-rationale { color: #86efac; } /* green  — signals a solution  */

    /* Collapsible code block */
    details.card-code {
      border: 1px solid #1e293b;
      border-radius: 6px;
      overflow: hidden;
    }
    details.card-code summary {
      padding: 5px 10px;
      font-size: 10px;
      color: #64748b;
      cursor: pointer;
      user-select: none;
      background: #1e293b;
      list-style: none;
    }
    details.card-code summary::before { content: "▶ "; }
    details.card-code[open] summary::before { content: "▼ "; }
    #card-code-preview {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 10.5px;
      color: #a5f3fc;
      padding: 8px 10px;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      background: #020617;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #1e293b;
    }
    .btn-approve {
      flex: 1;
      padding: 7px;
      background: #15803d;
      color: #dcfce7;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-approve:hover:not(:disabled) { background: #166534; }
    .btn-approve:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-reject-card {
      flex: 1;
      padding: 7px;
      background: #7f1d1d;
      color: #fee2e2;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-reject-card:hover { background: #991b1b; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #2d2d50;
      border-bottom: 1px solid #2d2d50;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .btn-tool {
      padding: 5px 10px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    .btn-tool:hover { background: #334155; color: #e2e8f0; }
    .btn-tool.active { background: #4c1d95; color: #ddd6fe; border-color: #7c3aed; }
    #btn-undo { color: #fca5a5; border-color: #7f1d1d; display: none; }
    #btn-undo.visible { display: block; }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
    }
    #complaint-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 12.5px;
      resize: none;
      min-height: 40px;
      max-height: 80px;
      font-family: inherit;
      line-height: 1.4;
    }
    #complaint-input:focus { outline: none; border-color: #7c3aed; }
    #complaint-input::placeholder { color: #475569; }
    #complaint-input.socratic-mode {
      border-color: #38bdf8;
      background: #0c1e30;
    }
    #btn-send {
      padding: 8px 14px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      align-self: flex-end;
      font-weight: 600;
      flex-shrink: 0;
    }
    #btn-send:hover { background: #6d28d9; }
    #btn-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    #btn-send.socratic-mode { background: #0284c7; }
    #btn-send.socratic-mode:hover { background: #0369a1; }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="status-dot" id="ollama-status"></div>
    <h1>Friction Fixer</h1>
  </div>

  <div id="context-bar" class="empty">No element captured — use Inspector to pick one</div>

  <div id="chat">
    <div class="msg system">Pick an element with Inspector, then describe what's wrong.</div>
  </div>

  <!-- ── Preview Card ── -->
  <div id="preview-card">
    <div class="card-header">
      <span class="card-header-title">AI Patch Proposal</span>
      <span class="strategy-badge" id="strategy-badge">Strategy</span>
    </div>
    <div class="card-body">
      <div>
        <div class="card-section-label">UX Diagnosis</div>
        <div class="card-section-text" id="card-diagnosis"></div>
      </div>
      <div>
        <div class="card-section-label">Why this patch?</div>
        <div class="card-section-text" id="card-rationale"></div>
      </div>
      <details class="card-code">
        <summary>View CSS code</summary>
        <pre id="card-code-preview"></pre>
      </details>
    </div>
    <div class="card-actions">
      <button class="btn-approve" id="btn-approve">Approve Patch</button>
      <button class="btn-reject-card" id="btn-reject-card">Reject</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-tool" id="btn-inspector">Inspector</button>
    <button class="btn-tool" id="btn-clear-ctx">Clear ctx</button>
    <button class="btn-tool" id="btn-undo">Undo patch</button>
  </div>

  <div class="input-row">
    <textarea
      id="complaint-input"
      placeholder='Describe the issue, e.g. "text is too small and hard to read"'
      rows="2"
    ></textarea>
    <button id="btn-send">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
