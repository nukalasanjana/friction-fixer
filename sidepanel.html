<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friction Fixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #16213e;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2d50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a78bfa;
      flex: 1;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.offline { background: #f87171; }

    /* ── Context badge ── */
    #context-bar {
      background: #0f3460;
      padding: 6px 14px;
      font-size: 11px;
      color: #93c5fd;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
    }
    #context-bar.empty { color: #6b7280; }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 90%;
      padding: 8px 11px;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 12.5px;
    }
    .msg.user {
      align-self: flex-end;
      background: #4c1d95;
      color: #ede9fe;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e293b;
      color: #cbd5e1;
    }
    .msg.system {
      align-self: center;
      background: #1c2b1c;
      color: #86efac;
      font-size: 11px;
      border-radius: 6px;
    }

    /* ── Preview sandbox ── */
    #preview-sandbox {
      margin: 0 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #preview-sandbox.visible { display: block; }
    .sandbox-header {
      background: #1e293b;
      padding: 7px 12px;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #patch-preview {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 11px;
      color: #a5f3fc;
      padding: 10px 12px;
      max-height: 140px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .sandbox-actions {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #1e293b;
    }
    .btn-accept {
      flex: 1;
      padding: 7px;
      background: #15803d;
      color: #dcfce7;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-accept:hover { background: #166534; }
    .btn-reject {
      flex: 1;
      padding: 7px;
      background: #7f1d1d;
      color: #fee2e2;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-reject:hover { background: #991b1b; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #2d2d50;
      border-bottom: 1px solid #2d2d50;
    }
    .btn-tool {
      padding: 5px 10px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    .btn-tool:hover { background: #334155; color: #e2e8f0; }
    .btn-tool.active { background: #4c1d95; color: #ddd6fe; border-color: #7c3aed; }
    #btn-undo { color: #fca5a5; border-color: #7f1d1d; display: none; }
    #btn-undo.visible { display: block; }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
    }
    #complaint-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 12.5px;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      font-family: inherit;
    }
    #complaint-input:focus { outline: none; border-color: #7c3aed; }
    #complaint-input::placeholder { color: #475569; }
    #btn-send {
      padding: 8px 14px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      align-self: flex-end;
      font-weight: 600;
    }
    #btn-send:hover { background: #6d28d9; }
    #btn-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="status-dot" id="ollama-status"></div>
    <h1>⚡ Friction Fixer</h1>
  </div>

  <div id="context-bar" class="empty">No element captured — use Inspector to pick one</div>

  <div id="chat">
    <div class="msg system">👋 Pick an element with Inspector, then describe what's wrong.</div>
  </div>

  <div id="preview-sandbox">
    <div class="sandbox-header">
      <span>🔍 Proposed patch — review before applying</span>
    </div>
    <pre id="patch-preview"></pre>
    <div class="sandbox-actions">
      <button class="btn-accept" id="btn-accept">✓ Accept &amp; Apply</button>
      <button class="btn-reject" id="btn-reject">✕ Reject</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-tool" id="btn-inspector">🔎 Inspector</button>
    <button class="btn-tool" id="btn-clear-ctx">⊘ Clear ctx</button>
    <button class="btn-tool" id="btn-undo">↩ Undo patch</button>
  </div>

  <div class="input-row">
    <textarea
      id="complaint-input"
      placeholder='Describe the issue, e.g. "text is too small and hard to read"'
      rows="2"
    ></textarea>
    <button id="btn-send">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
